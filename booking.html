  <meta name="twitter:description" content="立即預約諮詢。填寫表單，我們的合夥人會計師將盡快與您聯繫，提供專屬的財稅建議。">
  <meta name="twitter:image" content="https://www.horgoscpa.com/assets/images/hero.jpg">

  <link rel="stylesheet" href="/assets/css/organisms.css" media="print" onload="this.media='all'">

  <noscript><link rel="stylesheet" href="/assets/css/organisms.css"></noscript>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RKMCS9WVS5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-RKMCS9WVS5');
  </script>
  <style>
    .page-header{padding:180px 0 80px;text-align:center;background-color:var(--bg-base)}
    .page-header h1{font-size:2.5rem;font-weight:500;margin-top:10px;
      letter-spacing:.05em;color:var(--text-primary)}
    .page-header p{max-width:600px;margin:20px auto;
      color:var(--text-body);font-family:var(--font-sans)}
  </style>
</head>

<body>

  <!-- Navbar -->
  <div id="nav-placeholder"></div>

  <!-- Page Header (Standardized) -->
  <header class="page-header">
    <span class="eyebrow text-gold">專屬諮詢</span>
    <h1 class="display-text">預約諮詢</h1>
    <p class="text-body">
      我們目前僅接受預約。請填寫下方表單，我們會盡快與您聯繫。
    </p>
  </header>

  <div class="booking-container">
    <div class="container" style="padding-top: 0; padding-bottom: 40px;">

      <div class="invitation-container" style="padding-top: 0;">
        <form class="invitation-form" action="https://formspree.io/f/xwpovnwy" method="POST">

          <div class="form-group">
            <label>您的姓名 <span style="color:#d93025">*</span></label>
            <input type="text" name="name" class="input-line" placeholder="請輸入姓名"
              required minlength="2" autocomplete="name">
          </div>

          <div class="form-group">
            <label>聯絡電話 <span style="color:#d93025">*</span></label>
            <input type="tel" name="phone" class="input-line" placeholder="手機或電話號碼"
              required pattern="09[0-9]{8}|0[1-9]{1,2}[0-9]{7,8}"
              title="請輸入手機（09開頭10碼）或市話（區碼+7~8碼）"
              maxlength="15" autocomplete="tel">
          </div>

          <div class="form-group">
            <label>電子郵件 <span style="color:#d93025">*</span></label>
            <input type="email" name="email" class="input-line" placeholder="請輸入電子郵件"
              required autocomplete="email">
          </div>

          <div class="form-group">
            <label>諮詢項目</label>
            <div class="radio-options">
              <div class="radio-card">
                <input type="radio" id="topic-registration" name="topic" value="工商登記" checked>
                <label for="topic-registration">工商登記</label>
              </div>
              <div class="radio-card">
                <input type="radio" id="topic-accounting" name="topic" value="帳務處理">
                <label for="topic-accounting">帳務處理</label>
              </div>
              <div class="radio-card">
                <input type="radio" id="topic-tax" name="topic" value="稅務申報">
                <label for="topic-tax">稅務申報</label>
              </div>
              <div class="radio-card">
                <input type="radio" id="topic-audit" name="topic" value="財稅簽證">
                <label for="topic-audit">財稅簽證</label>
              </div>
              <div class="radio-card">
                <input type="radio" id="topic-other" name="topic" value="其他需求">
                <label for="topic-other">其他需求</label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>備註說明</label>
            <input type="text" name="message" class="input-line" placeholder="請簡述您的需求..."
              minlength="5">
          </div>

          <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 30px;">
            <input type="checkbox" id="privacy-agreement" name="agreement" required style="width: auto;">
            <label for="privacy-agreement"
              style="margin: 0; font-size: 0.9rem; font-family: var(--font-sans);">我同意讓您們通過我提供的資訊與我聯繫</label>
          </div>

          <button type="submit" class="btn-solid-gold" style="width:100%; margin-top: 10px;">送出預約</button>

          <!-- Integrated Notices -->
          <div class="booking-notices">
            <h4>預約須知</h4>
            <ul>
              <li>本事務所採完全預約制，請務必填寫正確聯絡資訊，我們將於 1-2 個工作日內與您聯繫確認時間。</li>
              <li>如需取消或更改預約，請至少提前 24 小時告知。</li>
              <li>所有諮詢內容均嚴格保密，您的隱私是我們的首要考量。</li>
            </ul>
          </div>

          <p class="text-center" style="font-size: 0.8rem; color: #999; margin-top: 20px;">
            您的資料將受到最高規格的保密。
          </p>
        </form>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script type="module" src="/assets/js/main.js"></script>
</body>

</html>
