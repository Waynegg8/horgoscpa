name: 智能文档处理 v3.0 - 完整功能分组版

on:
  # 🔧 分组方式：将原有10个功能分为4个逻辑组
  workflow_dispatch:
    inputs:
      # 📝 内容处理组 (整合4个相关功能)
      content_operations:
        description: '内容处理操作'
        required: true
        default: 'process_word,update_json,validate_content'
        type: choice
        options:
          - 'process_word'                           # 只处理Word文档
          - 'update_json'                           # 只更新JSON
          - 'validate_content'                      # 只验证内容
          - 'process_word,update_json'              # Word+JSON
          - 'process_word,validate_content'         # Word+验证
          - 'process_word,update_json,validate_content'  # 完整内容流程
          - 'force_scan,update_json'                # 强制扫描+更新
          - 'all_content'                           # 所有内容相关操作
      
      # 🗂️ 维护管理组 (整合3个维护功能)
      maintenance_operations:
        description: '维护管理操作'
        required: true 
        default: 'update_sitemap'
        type: choice
        options:
          - 'none'                                  # 跳过维护操作
          - 'handle_deletion'                       # 只处理删除
          - 'update_sitemap'                        # 只更新站点地图
          - 'update_dictionary'                     # 只更新翻译字典
          - 'handle_deletion,update_sitemap'        # 删除+站点地图
          - 'update_sitemap,update_dictionary'      # 站点地图+字典
          - 'all_maintenance'                       # 所有维护操作
      
      # 🎬 媒体发布组 (整合2个发布功能)
      media_publishing:
        description: '媒体和发布操作'
        required: true
        default: 'none'
        type: choice
        options:
          - 'none'                                  # 跳过媒体操作
          - 'update_videos'                         # 只更新视频
          - 'publish_scheduled'                     # 只发布排程文章
          - 'update_videos,publish_scheduled'       # 视频+排程发布
          - 'all_media'                            # 所有媒体操作
      
      # ⚙️ 系统配置组 (处理模式和特殊选项)
      system_config:
        description: '系统配置'
        required: true
        default: 'enhanced_processor'
        type: choice
        options:
          - 'basic_processor'                       # 使用基础处理器
          - 'enhanced_processor'                    # 使用增强处理器(默认)
          - 'enhanced_processor,strict_validation'  # 增强+严格验证
          - 'enhanced_processor,force_mode'         # 增强+强制模式
          - 'legacy_compatibility'                  # 兼容模式
      
      # 🎯 处理范围 (保留原有逻辑)
      processing_scope:
        description: '处理范围'
        required: true
        default: 'auto_detect'
        type: choice
        options:
          - 'auto_detect'                          # 自动检测
          - 'new_files_only'                       # 只处理新文件
          - 'all_files'                           # 处理所有文件
          - 'force_all_ignore_cache'               # 强制处理忽略缓存
          - 'specific_date'                        # 特定日期(需要在代码中指定)
      
      # 🔧 高级选项 (JSON格式的精确控制)
      advanced_overrides:
        description: '高级选项覆盖 (JSON格式，可选)'
        required: false
        type: string
        # 示例: {"force_scan": true, "skip_video_check": false, "custom_validation_rules": ["check_decimals", "verify_highlights"]}
  
  # 保留所有原有触发条件
  push:
    paths:
      - '**/*'
  
  delete:
    paths:
      - 'blog/**/*.html'
      - 'services/**/*.html'
      - '*.html'
  
  schedule:
    - cron: '0 1 * * *'
    
  # 完整保留所有repository_dispatch事件
  repository_dispatch:
    types: [
      delete-article, upload-article, scan-articles, update-video, 
      update-sitemap, publish-scheduled, update-dictionary, validate-content,
      # 新增v3.0特定事件
      intelligent-process, quality-check, maintenance-mode
    ]

jobs:
  intelligent-document-processing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      # 1-4. 基础设置步骤保持不变
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 设置Git配置
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖套件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install beautifulsoup4 lxml jieba python-docx loguru pathlib dataclasses
      
      - name: 创建必要目录
        run: |
          mkdir -p blog assets/data assets/images/blog assets/css assets/js
          mkdir -p word-docs/processed video .github/scripts logs scripts
          mkdir -p validation-reports reports config
      
      # 5. 🔧 完全修复的智能配置解析器
      - name: 智能配置解析和功能映射
        id: parse_operations
        run: |
          echo "🔧 解析分组配置并映射到具体功能..."
          
          cat > parse_config.py << 'EOF'
          import json
          import os
          import sys
          
          def safe_split(value):
              """安全分割字符串"""
              if not value or value.strip() == '':
                  return []
              return [item.strip() for item in value.split(',') if item.strip()]
          
          def write_env_var(key, value):
              """安全写入环境变量"""
              try:
                  env_key = key.upper()
                  str_value = str(value).lower()
                  
                  # 写入到GITHUB_ENV
                  with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
                      f.write(f'{env_key}={str_value}\n')
                  
                  # 写入到GITHUB_OUTPUT
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                      f.write(f'{key}={str_value}\n')
                  
                  print(f'设置环境变量: {env_key}={str_value}')
              except Exception as e:
                  print(f'写入环境变量失败: {key}={value}, 错误: {e}')
          
          def main():
              try:
                  # 解析输入参数
                  content_ops = safe_split('${{ github.event.inputs.content_operations }}')
                  maintenance_ops = safe_split('${{ github.event.inputs.maintenance_operations }}')
                  media_ops = safe_split('${{ github.event.inputs.media_publishing }}')
                  system_config = safe_split('${{ github.event.inputs.system_config }}')
                  
                  print(f'输入解析结果:')
                  print(f'  content_ops: {content_ops}')
                  print(f'  maintenance_ops: {maintenance_ops}')
                  print(f'  media_ops: {media_ops}')
                  print(f'  system_config: {system_config}')
                  
                  # 解析高级选项
                  advanced_overrides = {}
                  advanced_input = '${{ github.event.inputs.advanced_overrides }}'
                  if advanced_input and advanced_input.strip():
                      try:
                          advanced_overrides = json.loads(advanced_input)
                          print(f'高级选项: {advanced_overrides}')
                      except json.JSONDecodeError as e:
                          print(f'高级选项JSON格式错误: {e}，使用默认配置')
                  
                  # 初始化操作标志
                  operations = {
                      'process_word': False,
                      'update_json': False,
                      'handle_deletion': False,
                      'update_videos': False,
                      'force_scan': False,
                      'update_sitemap': False,
                      'publish_scheduled': False,
                      'update_dictionary': False,
                      'validate_content': False,
                      'use_enhanced_processor': False
                  }
                  
                  # 解析内容操作组
                  if 'all_content' in content_ops:
                      operations.update({
                          'process_word': True,
                          'update_json': True,
                          'validate_content': True,
                          'force_scan': True
                      })
                  else:
                      for op in content_ops:
                          if op in operations:
                              operations[op] = True
                  
                  # 解析维护操作组
                  if 'all_maintenance' in maintenance_ops:
                      operations.update({
                          'handle_deletion': True,
                          'update_sitemap': True,
                          'update_dictionary': True
                      })
                  elif 'none' not in maintenance_ops:
                      for op in maintenance_ops:
                          if op in operations:
                              operations[op] = True
                  
                  # 解析媒体发布组
                  if 'all_media' in media_ops:
                      operations.update({
                          'update_videos': True,
                          'publish_scheduled': True
                      })
                  elif 'none' not in media_ops:
                      for op in media_ops:
                          if op in operations:
                              operations[op] = True
                  
                  # 解析系统配置
                  if 'enhanced_processor' in system_config:
                      operations['use_enhanced_processor'] = True
                  if 'force_mode' in system_config:
                      operations['force_scan'] = True
                  if 'strict_validation' in system_config:
                      operations['validate_content'] = True
                  
                  # 应用高级覆盖
                  operations.update(advanced_overrides)
                  
                  # 智能触发条件适配
                  trigger_type = '${{ github.event_name }}'
                  if trigger_type == 'schedule':
                      operations.update({
                          'update_sitemap': True,
                          'update_dictionary': True,
                          'publish_scheduled': True
                      })
                  elif trigger_type == 'repository_dispatch':
                      action = '${{ github.event.action }}'
                      dispatch_mapping = {
                          'delete-article': {'handle_deletion': True},
                          'upload-article': {'process_word': True, 'update_json': True},
                          'scan-articles': {'force_scan': True, 'update_json': True},
                          'update-video': {'update_videos': True},
                          'update-sitemap': {'update_sitemap': True},
                          'publish-scheduled': {'publish_scheduled': True},
                          'update-dictionary': {'update_dictionary': True},
                          'validate-content': {'validate_content': True},
                          'intelligent-process': {'process_word': True, 'validate_content': True, 'use_enhanced_processor': True},
                          'maintenance-mode': {'update_sitemap': True, 'update_dictionary': True}
                      }
                      if action in dispatch_mapping:
                          operations.update(dispatch_mapping[action])
                  elif trigger_type == 'push':
                      operations.update({
                          'process_word': True,
                          'update_json': True,
                          'update_sitemap': True
                      })
                  elif trigger_type == 'delete':
                      operations['handle_deletion'] = True
                  
                  # 写入环境变量
                  for key, value in operations.items():
                      write_env_var(key, value)
                  
                  # 输出解析结果
                  enabled_ops = [k for k, v in operations.items() if v]
                  print(f'✅ 配置解析完成')
                  print(f'📋 启用的操作: {enabled_ops}')
                  print(f'🎯 处理范围: ${{ github.event.inputs.processing_scope }}')
                  print(f'⚙️ 系统配置: ${{ github.event.inputs.system_config }}')
                  
              except Exception as e:
                  print(f'配置解析失败: {e}')
                  import traceback
                  traceback.print_exc()
                  sys.exit(1)
          
          if __name__ == '__main__':
              main()
          EOF
          
          python parse_config.py
          rm -f parse_config.py
      
      # 6. 🔧 完整保留：API触发的文章删除处理
      - name: 处理API触发的文章删除
        if: env.HANDLE_DELETION == 'true' || (github.event_name == 'repository_dispatch' && github.event.action == 'delete-article')
        run: |
          echo "🗑️ 处理API触发的文章删除请求"
          echo "文件路径: ${{ github.event.client_payload.file_path }}"
          echo "文章标题: ${{ github.event.client_payload.article_title }}"
          
          # 确保工作区干净
          git stash -u || true
          git pull origin "${GITHUB_REF##*/}" || true
          git stash pop || true
          
          # 检查文件是否存在
          FILE_PATH="${{ github.event.client_payload.file_path }}"
          if [ -n "${FILE_PATH}" ] && [ -f "${FILE_PATH}" ]; then
            rm "${FILE_PATH}"
            echo "✅ 文件已删除: ${FILE_PATH}"
            
            git add -A
            git commit -m "🗑️ 透过API删除文章: ${{ github.event.client_payload.article_title }}"
            git push
            echo "✅ 已提交删除操作"
          else
            echo "⚠️ 找不到要删除的文件: ${FILE_PATH}"
          fi
      
      # 7. 🔧 完整保留：检查Word文档逻辑
      - name: 检查Word文档
        id: check_word_docs
        if: env.PROCESS_WORD == 'true' || env.FORCE_SCAN == 'true'
        run: |
          echo "🔍 检查Word文档..."
          
          # 创建word-docs目录（如果不存在）
          mkdir -p word-docs
          
          # 统计Word文档数量
          DOCX_COUNT=$(find word-docs -maxdepth 1 -type f -name "*.docx" 2>/dev/null | wc -l)
          
          echo "发现 ${DOCX_COUNT} 个Word文档"
          
          if [ "${DOCX_COUNT}" -gt 0 ]; then
            echo "has_word_docs=true" >> "$GITHUB_OUTPUT"
            echo "🔍 发现 ${DOCX_COUNT} 个Word文档，将使用处理器进行处理"
            find word-docs -maxdepth 1 -type f -name "*.docx" 2>/dev/null || echo "无法列出文档详情"
          else
            echo "has_word_docs=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 未发现需要处理的Word文档"
          fi
      
      # 8. 🔧 完全修复：智能Word文档处理
      - name: 智能Word文档处理 v3.0
        id: process_word
        if: env.PROCESS_WORD == 'true' && steps.check_word_docs.outputs.has_word_docs == 'true'
        run: |
          echo "===== 🚀 智能Word文档处理开始 ====="
          
          # 确定处理模式
          if [ "$USE_ENHANCED_PROCESSOR" = "true" ]; then
            PROCESSING_MODE="enhanced"
            echo "✅ 使用增强版处理器 v3.0"
          else
            PROCESSING_MODE="standard"
            echo "ℹ️ 使用标准处理器"
          fi
          
          # 确定处理范围参数
          SCOPE_ARGS=""
          case "${{ github.event.inputs.processing_scope }}" in
            "force_all_ignore_cache")
              SCOPE_ARGS="--force-process-all"
              ;;
            "all_files")
              SCOPE_ARGS="--process-all"
              ;;
            "new_files_only")
              SCOPE_ARGS="--only-before-today"
              ;;
            *)
              SCOPE_ARGS=""  # auto_detect
              ;;
          esac
          
          echo "🔄 开始处理Word文档..."
          echo "处理模式: ${PROCESSING_MODE}"
          echo "处理参数: ${SCOPE_ARGS}"
          
          # 创建处理脚本
          cat > process_documents.py << 'EOF'
          import sys
          import os
          import traceback
          from pathlib import Path
          
          def write_output(key, value):
              """安全写入GitHub输出"""
              try:
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                      f.write(f'{key}={value}\n')
                  print(f'输出设置: {key}={value}')
              except Exception as e:
                  print(f'写入输出失败: {key}={value}, 错误: {e}')
          
          def try_v3_processor():
              """尝试使用v3.0统一处理器"""
              try:
                  sys.path.append('scripts')
                  from unified_document_processor import process_documents_batch
                  
                  print("🚀 使用统一智能处理器 v3.0")
                  
                  # 配置
                  config = {
                      'word_dir': 'word-docs',
                      'output_dir': 'blog',
                      'assets_dir': 'assets',
                      'processing_mode': os.environ.get('PROCESSING_MODE', 'standard'),
                      'quality_level': 'premium' if os.environ.get('USE_ENHANCED_PROCESSOR') == 'true' else 'standard'
                  }
                  
                  # 扫描文档
                  doc_paths = list(Path('word-docs').glob('*.docx'))
                  if not doc_paths:
                      print('⚠️ 没有找到需要处理的文档')
                      write_output('html_changed', 'false')
                      write_output('quality_score', '0')
                      return True
                  
                  print(f'📄 找到 {len(doc_paths)} 个文档待处理')
                  
                  # 批量处理
                  results = process_documents_batch([str(p) for p in doc_paths], config)
                  
                  print(f'✅ v3.0处理完成: 成功 {results["successful"]}, 失败 {results["failed"]}')
                  print(f'📊 质量评分: {results.get("overall_quality_score", 0):.1f}/100')
                  
                  # 设置输出
                  success = results["successful"] > 0
                  quality = results.get("overall_quality_score", 0)
                  
                  write_output('html_changed', str(success).lower())
                  write_output('quality_score', str(quality))
                  
                  return True
                  
              except ImportError as e:
                  print(f'v3.0处理器导入失败: {e}')
                  return False
              except Exception as e:
                  print(f'❌ v3.0处理器执行失败: {e}')
                  traceback.print_exc()
                  write_output('html_changed', 'false')
                  write_output('quality_score', '0')
                  return False
          
          def try_legacy_processor():
              """尝试使用传统处理器"""
              try:
                  print("⚠️ 使用传统处理器")
                  
                  # 构建命令
                  import subprocess
                  cmd = ['python', 'main.py', '--enhanced']
                  
                  # 添加处理范围参数
                  scope_args = os.environ.get('SCOPE_ARGS', '').strip()
                  if scope_args:
                      for arg in scope_args.split():
                          if arg.strip():
                              cmd.append(arg.strip())
                  
                  cmd.append('--debug')
                  
                  print(f'执行命令: {" ".join(cmd)}')
                  
                  # 执行命令
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=300)
                  
                  if result.returncode == 0:
                      print("✅ 传统处理器处理成功")
                      print(f"输出: {result.stdout}")
                      write_output('html_changed', 'true')
                      write_output('quality_score', '75')  # 默认质量分数
                      return True
                  else:
                      print(f"❌ 传统处理器处理失败: {result.stderr}")
                      write_output('html_changed', 'false')
                      write_output('quality_score', '0')
                      return False
                      
              except subprocess.TimeoutExpired:
                  print("❌ 传统处理器执行超时")
                  write_output('html_changed', 'false')
                  write_output('quality_score', '0')
                  return False
              except Exception as e:
                  print(f"❌ 传统处理器执行异常: {e}")
                  traceback.print_exc()
                  write_output('html_changed', 'false')
                  write_output('quality_score', '0')
                  return False
          
          def main():
              """主处理函数"""
              try:
                  # 首先尝试v3.0处理器
                  if try_v3_processor():
                      return
                  
                  # 如果v3.0失败，尝试传统处理器
                  print("回退到传统处理器...")
                  if not try_legacy_processor():
                      print("❌ 所有处理器都失败了")
                      sys.exit(1)
                      
              except Exception as e:
                  print(f"❌ 处理过程中发生严重错误: {e}")
                  traceback.print_exc()
                  write_output('html_changed', 'false')
                  write_output('quality_score', '0')
                  sys.exit(1)
          
          if __name__ == '__main__':
              main()
          EOF
          
          # 设置环境变量供Python脚本使用
          export PROCESSING_MODE="${PROCESSING_MODE}"
          export SCOPE_ARGS="${SCOPE_ARGS}"
          
          # 执行处理脚本
          python process_documents.py
          
          # 清理
          rm -f process_documents.py
          
          echo "===== ✅ Word文档处理结束 ====="
      
      # 9. 🔧 修复版：内容完整性验证
      - name: 内容完整性验证 v3.0
        id: validate_content
        if: env.VALIDATE_CONTENT == 'true' && (steps.process_word.outputs.html_changed == 'true' || github.event_name == 'repository_dispatch')
        run: |
          echo "🔍 开始内容完整性验证..."
          
          cat > validate_content.py << 'EOF'
          import sys
          import os
          from pathlib import Path
          import re
          
          def main():
              try:
                  sys.path.append('scripts')
                  
                  # 验证最新生成的HTML文件
                  html_files = list(Path('blog').glob('*.html'))
                  if not html_files:
                      print('⚠️ 没有找到需要验证的HTML文件')
                      return
                  
                  # 按修改时间排序，获取最新文件
                  latest_file = max(html_files, key=lambda x: x.stat().st_mtime)
                  print(f'🔍 验证文件: {latest_file}')
                  
                  # 读取HTML内容
                  with open(latest_file, 'r', encoding='utf-8') as f:
                      html_content = f.read()
                  
                  # 检查小数点数字是否正确处理
                  decimal_numbers = re.findall(r'\d+\.\d+', html_content)
                  print(f'✅ 发现 {len(decimal_numbers)} 个小数，包括: {decimal_numbers[:3]}')
                  
                  # 检查高亮标签
                  highlight_classes = ['highlight-final-result', 'highlight-deadline', 'highlight-amount', 'highlight-percent']
                  highlights_found = 0
                  for cls in highlight_classes:
                      count = html_content.count(f'class="{cls}"')
                      if count > 0:
                          highlights_found += 1
                          print(f'✅ 发现高亮类型 {cls}: {count} 个')
                  
                  print(f'✅ 总共发现 {highlights_found} 种高亮类型')
                  
                  # 检查内容长度
                  content_length = len(html_content)
                  print(f'✅ HTML内容长度: {content_length} 字符')
                  
                  # 基本质量检查
                  if content_length < 100:
                      print('⚠️ 警告: HTML内容过短')
                  
                  if len(decimal_numbers) == 0 and 'word-docs' in str(latest_file.parent.parent):
                      print('⚠️ 警告: 没有发现小数点数字，可能存在提取问题')
                  
                  print('✅ v3.0内容验证完成')
                  
                  # 写入验证完成状态
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                      f.write('validation_completed=true\n')
                  
              except Exception as e:
                  print(f'⚠️ 验证过程出错: {e}')
                  import traceback
                  traceback.print_exc()
                  
                  # 即使验证失败也标记为完成，避免阻塞流程
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                      f.write('validation_completed=true\n')
          
          if __name__ == '__main__':
              main()
          EOF
          
          python validate_content.py
          rm -f validate_content.py
      
      # 10. 🔧 修复版：上传并提交转换后的HTML
      - name: 上传并提交转换后的HTML
        if: steps.process_word.outputs.html_changed == 'true'
        run: |
          echo "📤 开始提交转换后的HTML文件..."
          
          git status
          git add blog/*.html 2>/dev/null || echo "没有HTML文件需要添加"
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "⚠️ 没有新的HTML文件需要提交"
          else
            CHANGED_FILES=$(git diff --name-only --cached | grep -c "\.html" || echo "0")
            echo "🔍 检测到 ${CHANGED_FILES} 个变更的HTML文件"
            
            # 构建提交信息
            COMMIT_MSG="✨ v3.0智能处理器转换的HTML文件"
            QUALITY_SCORE="${{ steps.process_word.outputs.quality_score }}"
            if [ -n "${QUALITY_SCORE}" ] && [ "${QUALITY_SCORE}" != "0" ]; then
              COMMIT_MSG="${COMMIT_MSG} (质量评分: ${QUALITY_SCORE})"
            fi
            
            git commit -m "${COMMIT_MSG}"
            git push
            echo "✅ HTML文件提交成功"
          fi
      
      # 11. 🔧 修复版：检查是否有文章被删除
      - name: 检查是否有文章被删除
        id: check_deleted
        if: env.HANDLE_DELETION == 'true' || github.event_name == 'delete'
        run: |
          echo "🔍 检查是否有文章被删除..."
          
          # 安全检查git日志
          DELETED_FILES=0
          if git log --diff-filter=D --name-only -n 1 2>/dev/null | grep -q "blog.*\.html"; then
            DELETED_FILES=$(git log --diff-filter=D --name-only -n 1 2>/dev/null | grep -c "blog.*\.html" || echo "0")
          fi
          
          echo "📊 检测到 ${DELETED_FILES} 个被删除的HTML文件"
          
          if [ "${DELETED_FILES}" -gt "0" ]; then
            echo "html_deleted=true" >> "$GITHUB_OUTPUT"
          else
            echo "html_deleted=false" >> "$GITHUB_OUTPUT"
          fi
      
      # 12. 🔧 修复版：更新博客JSON文件
      - name: 更新博客JSON文件
        id: update_blog_json
        if: env.UPDATE_JSON == 'true' || steps.process_word.outputs.html_changed == 'true' || steps.check_deleted.outputs.html_deleted == 'true' || env.FORCE_SCAN == 'true'
        run: |
          echo "📝 开始更新博客JSON文件..."
          
          # 构建扫描参数
          SCAN_ARGS=""
          if [ "$FORCE_SCAN" = "true" ]; then
            SCAN_ARGS="--force-scan"
            echo "🔄 启用强制扫描模式"
          fi
          
          # 检查脚本是否存在
          if [ ! -f ".github/scripts/update_blog_json.py" ]; then
            echo "⚠️ 警告: update_blog_json.py 脚本不存在，跳过JSON更新"
            echo "blog_json_updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # 执行JSON更新脚本
          if python .github/scripts/update_blog_json.py $SCAN_ARGS; then
            echo "✅ 博客JSON文件更新完成"
            echo "blog_json_updated=true" >> "$GITHUB_OUTPUT"
            
            # 提交更新后的JSON文件
            git add assets/data/blog-posts.json assets/data/blog-index.json assets/data/latest-posts.json assets/data/series.json 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "📊 更新博客JSON文件 (v3.0智能处理器)" || echo "提交失败，但继续执行"
              git push || echo "推送失败，但继续执行"
            else
              echo "📊 JSON文件无变更，无需提交"
            fi
          else
            echo "⚠️ JSON更新脚本执行失败"
            echo "blog_json_updated=false" >> "$GITHUB_OUTPUT"
          fi
      
      # 13. 🔧 修复版：更新影片数据
      - name: 更新影片数据
        id: update_videos
        if: env.UPDATE_VIDEOS == 'true' || (github.event_name == 'push' && contains(github.event.head_commit.modified, 'video/videos.txt'))
        run: |
          echo "🎬 检测到需要更新影片数据"
          
          if [ -f "video/videos.txt" ]; then
            echo "📁 找到 video/videos.txt，准备更新影片数据"
            
            # 检查脚本是否存在
            if [ ! -f ".github/scripts/update_videos.py" ]; then
              echo "⚠️ 警告: update_videos.py 脚本不存在，跳过视频更新"
              echo "videos_updated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
            if python .github/scripts/update_videos.py; then
              echo "videos_updated=true" >> "$GITHUB_OUTPUT"
              
              git add assets/data/videos.json 2>/dev/null || true
              if ! git diff --cached --quiet; then
                git commit -m "🎬 更新影片JSON数据 (v3.0)" || echo "提交失败，但继续执行"
                git push || echo "推送失败，但继续执行"
              else
                echo "📹 视频JSON文件无变更，无需提交"
              fi
            else
              echo "⚠️ 影片数据更新脚本执行失败"
              echo "videos_updated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "⚠️ 找不到 video/videos.txt 文件"
            echo "videos_updated=false" >> "$GITHUB_OUTPUT"
          fi
      
      # 14. 🔧 修复版：发布排程文章
      - name: 发布排程文章
        id: publish_scheduled
        if: env.PUBLISH_SCHEDULED == 'true' || github.event_name == 'schedule'
        run: |
          echo "📅 检查并发布排程文章..."
          
          cat > check_scheduled.py << 'EOF'
          from datetime import datetime
          import json
          from pathlib import Path
          import os
          
          def main():
              try:
                  print(f'📅 检查排程文章 - 当前时间: {datetime.now()}')
                  
                  # 检查是否有排程文章需要发布
                  scheduled_file = Path('assets/data/scheduled_posts.json')
                  if scheduled_file.exists():
                      print('📋 发现排程文章配置文件')
                      try:
                          with open(scheduled_file, 'r', encoding='utf-8') as f:
                              scheduled_posts = json.load(f)
                          print(f'📝 读取到 {len(scheduled_posts)} 个排程配置')
                          
                          # 这里可以实现具体的排程逻辑
                          # 比如检查哪些文章到了发布时间
                          
                      except Exception as e:
                          print(f'⚠️ 读取排程文章失败: {e}')
                  else:
                      print('ℹ️ 没有发现排程文章配置文件')
                  
                  print('✅ 排程文章检查完成')
                  
                  # 写入完成状态
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                      f.write('scheduled_published=true\n')
                      
              except Exception as e:
                  print(f'⚠️ 排程检查过程出错: {e}')
                  with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                      f.write('scheduled_published=false\n')
          
          if __name__ == '__main__':
              main()
          EOF
          
          python check_scheduled.py
          rm -f check_scheduled.py
      
      # 15. 🔧 修复版：清理已处理的Word文档
      - name: 清理已处理的Word文档 v3.0
        if: steps.process_word.outputs.html_changed == 'true'
        run: |
          echo "🔄 开始移动已处理的Word文档 (v3.0)..."
          
          # 确保工作区是最新的
          git stash -u || true
          git pull origin "${GITHUB_REF##*/}" || true
          git stash pop || true
          
          if [ -d "word-docs" ] && [ -f "assets/data/processed_files.json" ]; then
            # 创建临时文件列表
            TEMP_FILES_LIST=$(mktemp)
            
            # 安全提取已处理文件列表
            if grep -o '"word-docs/[^"]*"' assets/data/processed_files.json 2>/dev/null | tr -d '"' > "$TEMP_FILES_LIST"; then
              mkdir -p word-docs/processed
              
              MOVED_COUNT=0
              
              # 安全处理文件移动
              while IFS= read -r FILE_PATH; do
                # 检查文件路径不为空且文件存在
                if [ -n "${FILE_PATH}" ] && [ -f "${FILE_PATH}" ]; then
                  FILE_NAME=$(basename "${FILE_PATH}")
                  TIMESTAMP=$(date +%Y%m%d%H%M%S)
                  FILE_BASE="${FILE_NAME%.*}"
                  FILE_EXT="${FILE_NAME##*.}"
                  TARGET_PATH="word-docs/processed/${FILE_BASE}_v3.0_${TIMESTAMP}.${FILE_EXT}"
                  
                  # 确保目标路径不存在
                  if [ ! -f "${TARGET_PATH}" ]; then
                    mv "${FILE_PATH}" "${TARGET_PATH}"
                    echo "✅ 已移动 (v3.0): ${FILE_PATH} -> ${TARGET_PATH}"
                    MOVED_COUNT=$((MOVED_COUNT + 1))
                  else
                    echo "⚠️ 目标文件已存在，跳过: ${TARGET_PATH}"
                  fi
                fi
              done < "$TEMP_FILES_LIST"
              
              # 清理临时文件
              rm -f "$TEMP_FILES_LIST"
              
              echo "📊 总共移动了 ${MOVED_COUNT} 个v3.0处理的文件"
              
              # 只有移动了文件才提交
              if [ "${MOVED_COUNT}" -gt 0 ]; then
                git add word-docs/ assets/data/processed_files.json 2>/dev/null || true
                if ! git diff --cached --quiet; then
                  git commit -m "🗂️ 移动v3.0智能处理器处理的Word文档" || echo "提交失败，但继续执行"
                  git push || echo "推送失败，但继续执行"
                fi
              fi
            else
              echo "⚠️ 无法读取已处理文件记录"
            fi
          else
            echo "⚠️ 没有需要处理的Word文档或找不到已处理文件记录"
          fi
      
      # 16. 🔧 修复版：更新网站Sitemap
      - name: 更新网站Sitemap
        id: update_sitemap
        if: env.UPDATE_SITEMAP == 'true' || github.event_name == 'schedule' || steps.process_word.outputs.html_changed == 'true' || steps.update_blog_json.outputs.blog_json_updated == 'true'
        run: |
          echo "🗺️ 开始更新网站Sitemap..."
          
          # 检查脚本是否存在
          if [ ! -f ".github/scripts/generate_sitemap.py" ]; then
            echo "⚠️ 警告: generate_sitemap.py 脚本不存在，跳过Sitemap更新"
            exit 0
          fi
          
          if python .github/scripts/generate_sitemap.py; then
            echo "✅ Sitemap生成成功"
            
            # 检查生成的文件并提交
            SITEMAP_FILES=""
            [ -f "sitemap.xml" ] && SITEMAP_FILES="$SITEMAP_FILES sitemap.xml"
            [ -f "sitemap_index.xml" ] && SITEMAP_FILES="$SITEMAP_FILES sitemap_index.xml"
            [ -f "video-sitemap.xml" ] && SITEMAP_FILES="$SITEMAP_FILES video-sitemap.xml"
            
            if [ -n "$SITEMAP_FILES" ]; then
              git add $SITEMAP_FILES 2>/dev/null || true
              if ! git diff --cached --quiet; then
                git commit -m "🗺️ 更新网站Sitemap (v3.0智能处理器)" || echo "提交失败，但继续执行"
                git push || echo "推送失败，但继续执行"
                echo "✅ Sitemap更新完成并已提交"
              else
                echo "📍 Sitemap文件无变更，无需提交"
              fi
            else
              echo "⚠️ 没有生成Sitemap文件"
            fi
          else
            echo "⚠️ 警告: Sitemap生成脚本执行失败"
          fi
      
      # 17. 🔧 修复版：更新翻译字典
      - name: 更新翻译字典
        if: env.UPDATE_DICTIONARY == 'true' || steps.process_word.outputs.html_changed == 'true'
        run: |
          echo "🌐 检查并更新翻译字典..."
          
          cat > update_translation.py << 'EOF'
          import sys
          import os
          
          def main():
              try:
                  sys.path.append('scripts')
                  from translator import get_translator
                  
                  translator = get_translator()
                  result = translator.export_dictionary('assets/data/translation_dict_export.json')
                  
                  if result:
                      print('✅ 翻译字典更新完成')
                      return True
                  else:
                      print('⚠️ 翻译字典导出失败')
                      return False
                      
              except ImportError:
                  print('⚠️ 翻译器模块不可用')
                  return False
              except Exception as e:
                  print(f'⚠️ 翻译字典更新失败: {e}')
                  return False
          
          if __name__ == '__main__':
              success = main()
              sys.exit(0 if success else 1)
          EOF
          
          if python update_translation.py; then
            # 提交翻译字典更新
            git add assets/data/translation_dict.json assets/data/translation_dict_export.json 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "🌐 更新翻译字典 (v3.0)" || echo "提交失败，但继续执行"
              git push || echo "推送失败，但继续执行"
            else
              echo "📚 翻译字典无变更，无需提交"
            fi
          fi
          
          rm -f update_translation.py
      
